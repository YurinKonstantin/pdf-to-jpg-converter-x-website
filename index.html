<!DOCTYPE html>

</head>
<body>

<script>

    function switchLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('main-title').innerText = content[lang].title;
        document.getElementById('main-subtitle').innerText = content[lang].subtitle;
        
        document.getElementById('promo-section').innerHTML = `<h2>${content[lang].promoTitle}</h2>${content[lang].promoBody}`;
        document.getElementById('privacy-section').innerHTML = `<h2>${content[lang].privTitle}</h2>${content[lang].privBody}`;

    // Инициализация по умолчанию на английском
    switchLang('en');

</body>
</html>
