<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // Получаем основной язык браузера пользователя
        const userLang = navigator.language || navigator.userLanguage;
        
        // Если язык русский или украинский/белорусский, шлем в /ru/, иначе в /en/
        if (userLang.startsWith('ru') || userLang.startsWith('be') || userLang.startsWith('uk')) {
            window.location.href = "./ru/index.html";
        } else {
            window.location.href = "./en/index.html";
        }
    </script>
</head>
<body>
    <p>Redirecting to the appropriate language version... <a href="./en/index.html">Click here</a> if you are not redirected.</p>
</body>
</html>
